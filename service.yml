name: cli
contact:
  name: api
  jira_project_key: CLI
  email: api-team@confluent.io
  slack_team_channel: cli-eng
  slack_oncall_channel: cli-oncall
lang: go
lang_version: 1.26.1
git:
  enable: true
  hooks:
    enable: true
github:
  enable: true
gitignore:
  enable: true
semaphore:
  enable: true
  pipeline_enable: false
  tasks:
    - name: CLI Live Tests (Daily)
      branch: main
      pipeline_file: .semaphore/live-tests.yml
      at: "0 8 * * *"
make:
  enable: false
sonarqube:
  enable: true
  languages: ["go"]
  main_branch: main
