name: Label Generated Code PRs

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  issues: write
  pull-requests: read

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Check for generated code changes
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            const hasChecksum = files.some(f => f.filename === '.cli-generation-checksum' && f.status !== 'removed');
            const label = 'cli-terraform-generator';

            if (hasChecksum) {
              try {
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label, color: '6f42c1' });
              } catch (e) {
                if (e.status !== 422) throw e;
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [label],
              });
            } else {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: label,
                });
              } catch (e) {
                if (e.status !== 404) throw e;
              }
            }
